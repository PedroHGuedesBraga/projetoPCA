services:
  backend:
    build:
      context: ./backend-pca
    container_name: backend-pca
    env_file:
      - ./backend-pca/.env
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - ./backend-pca/uploads/pdfs:/app/uploads
    depends_on:
      banco:
        condition: service_healthy
    networks:
      - privateNet

  frontend:
    build:
      context: ./frontend-pca
    container_name: frontend-pca
    env_file:
      - ./frontend-pca/.env.local
    restart: unless-stopped
    expose:
      - "3001"
    depends_on:
      - backend
    networks:
      - publicNet

  banco:
    image: postgres:16-alpine
    container_name: banco-pca
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    env_file:
      - ./.env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    expose:
      - "5432"

    networks:
      - privateNet

  nginx:
    image: nginx:latest
    container_name: nginx-pca
    restart: unless-stopped

    depends_on:
      - frontend
      - backend

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    networks:
      - publicNet
      - privateNet

volumes:
  postgres_data:

networks:
  publicNet:
    driver: bridge

  privateNet:
    driver: bridge